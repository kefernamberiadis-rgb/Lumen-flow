workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Lumen Flow
    environment:
      groups:
        - ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kefern.lumenflow
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=XCYBL2AZ3S
    artifacts:
      - build/App.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true