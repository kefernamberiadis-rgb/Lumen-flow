workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Lumen Flow
    environment:
      groups:
        - ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kefern.lumenflow
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release -archivePath build/App.xcarchive -allowProvisioningUpdates CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="iPhone Distribution" PROVISIONING_PROFILE_SPECIFIER="Lumen Flow Distribution" DEVELOPMENT_TEAM=XCYBL2AZ3S archive
    artifacts:
      - build/App.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true