workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Lumen Flow
    environment:
      groups:
        - ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kefern.lumenflow
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" -configuration Release -archivePath build/App.xcarchive archive
    artifacts:
      - build/App.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true