workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Lumen Flow
    environment:
      groups:
        - ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kefern.lumenflow
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release -archivePath build/App.xcarchive -allowProvisioningUpdates CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="iPhone Distribution" PROVISIONING_PROFILE_SPECIFIER="Lumen Flow Distribution" DEVELOPMENT_TEAM=XCYBL2AZ3S archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportOptionsPlist /dev/stdin -exportPath build/ipa <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>XCYBL2AZ3S</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.kefern.lumenflow</key>
              <string>Lumen Flow Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF
    artifacts:
      - build/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    environment:
      android_signing:
        - lumenflow_keystore
      java: 21
      vars:
        PACKAGE_NAME: com.wLumenFlow_19769943
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
